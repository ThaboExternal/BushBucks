<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/extra/jet.ico">
  <link rel="stylesheet" href="/css/style.css">
  <title>CryptoJet - Account</title>
</head>
<body>
  <header class="topbar" id="topbar"></header>

  <main>
    <h1>Account details</h1>
    <div class="card" style="max-width:520px;">
      <form id="acctForm">
        <div class="row">
          <div>
            <label for="firstName">First name</label>
            <input type="text" id="firstName" required>
          </div>
          <div>
            <label for="lastName">Last name</label>
            <input type="text" id="lastName" required>
          </div>
        </div>

        <label for="email">Email</label>
        <input type="email" id="email" required>

        <label for="phone">Phone number</label>
        <input type="tel" id="phone" required>

        <label for="country">Country</label>
        <input type="text" id="country" required>

        <label for="prefCoin">Preferred cryptocurrency</label>
        <select id="prefCoin">
          <option value="BTC">Bitcoin</option>
          <option value="LTC">Litecoin</option>
          <option value="ETH">Ethereum</option>
          <option value="XRP">Ripple</option>
          <option value="USDC">USD Coin</option>
          <option value="XMR">Monero</option>
        </select>

        <p class="amount" id="walletCount"></p>

        <div class="row">
          <button type="submit">Save changes</button>
          <button type="button" id="deleteBtn" class="danger">Delete account</button>
        </div>
      </form>
      <p id="msg"></p>
    </div>
  </main>

  <footer class="site">CryptoJet &copy; 2026</footer>

  <script src="/js/api.js"></script>
  <script src="/js/nav.js"></script>
  <script>
    renderNav('admin');
    const session = Session.requireLogin();
    const msg = document.getElementById('msg');

    apiFetch(`/customer/${session.clientId}`)
      .then(c => {
        document.getElementById('firstName').value = c.fname;
        document.getElementById('lastName').value = c.lname;
        document.getElementById('email').value = c.email;
        document.getElementById('phone').value = c.phoneNum;
        document.getElementById('country').value = c.country;
        document.getElementById('prefCoin').value = c.prefCoin;
        document.getElementById('walletCount').textContent = `Number of wallets: ${c.walletCount}`;
      })
      .catch(err => { msg.className = 'error'; msg.textContent = err.message; });

    document.getElementById('acctForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.className = '';
      msg.textContent = '';
      try {
        await apiFetch(`/customer/${session.clientId}`, {
          method: 'PUT',
          body: JSON.stringify({
            firstName: document.getElementById('firstName').value,
            lastName: document.getElementById('lastName').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value,
            country: document.getElementById('country').value,
            prefCoin: document.getElementById('prefCoin').value
          })
        });
        session.firstName = document.getElementById('firstName').value;
        session.lastName = document.getElementById('lastName').value;
        Session.set(session);
        msg.className = 'success';
        msg.textContent = 'Account updated.';
      } catch (err) {
        msg.className = 'error';
        msg.textContent = err.message;
      }
    });

    document.getElementById('deleteBtn').addEventListener('click', async () => {
      const name = `${document.getElementById('firstName').value} ${document.getElementById('lastName').value}`;
      if (!confirm(`Are you sure you want to delete your account: ${name}?`)) return;
      try {
        await apiFetch(`/customer/${session.clientId}`, { method: 'DELETE' });
        Session.clear();
        window.location.href = '/login.html';
      } catch (err) {
        msg.className = 'error';
        msg.textContent = err.message;
      }
    });
  </script>
</body>
</html>
